<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NPC 预设编辑器 Pro Max</title>
<style>
    body { font-family: system-ui, sans-serif; background: #1e1e2e; color: #cdd6f4; margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .panel { background: #313244; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .full-width { grid-column: 1 / -1; }
    h2 { margin-top: 0; color: #89b4fa; border-bottom: 1px solid #45475a; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #bac2de; }
    input[type="text"], input[type="number"], textarea { width: 100%; padding: 8px; box-sizing: border-box; background: #181825; border: 1px solid #45475a; color: #cdd6f4; border-radius: 4px; }
    textarea { height: 100px; resize: vertical; }
    .flex-row { display: flex; gap: 10px; align-items: center; }
    .flex-row .form-group { flex: 1; }
    button { background: #89b4fa; color: #11111b; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
    button:hover { background: #b4befe; }
    .btn-random { background: #f38ba8; padding: 5px 10px; font-size: 0.8em; }
    .btn-random:hover { background: #eba0ac; }
    input[type="file"] { display: none; }
    .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
    .stat-result { display: flex; justify-content: space-between; background: #181825; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
    .stat-name { font-weight: bold; color: #f38ba8; }
    .stat-val { color: #a6e3a1; font-family: monospace; font-size: 1.1em; }
    .toggle-group { display: flex; gap: 20px; margin-bottom: 15px; background: #181825; padding: 10px; border-radius: 4px; }
    .toggle-group label { display: flex; align-items: center; gap: 8px; margin: 0; cursor: pointer; color: #a6e3a1; font-weight: bold; }
    input[type="checkbox"] { width: 18px; height: 18px; accent-color: #89b4fa; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
    <div class="full-width btn-group">
        <button onclick="document.getElementById('fileInput').click()">📂 导入预设 (JSON)</button>
        <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
        <button onclick="exportJSON()">💾 导出预设 (JSON)</button>
    </div>

    <div class="panel full-width">
        <h2>核心控制台</h2>
        <div class="toggle-group">
            <label><input type="checkbox" id="isMassProduced" onchange="updateAll()"> 标记为量产型模板 (无视独立生命周期)</label>
            <label><input type="checkbox" id="enableAI" checked onchange="updateAll()"> 接入 AI 动态演算接口</label>
        </div>
        <div class="form-group">
            <label>预设对话池 (每行一句，用于未接入 AI 或网络中断时的降级对话)</label>
            <textarea id="dialoguePresets" oninput="updateAll()">大爷，行行好，给点吃的吧...
今天天气真不错。
别来烦我！</textarea>
        </div>
    </div>

    <div class="panel">
        <h2>基础信息</h2>
        <div class="form-group">
            <label>NPC/模板 姓名</label>
            <input type="text" id="npcName" oninput="updateAll()">
        </div>
        <div class="form-group">
            <label>出生年份</label>
            <input type="number" id="birthYear" oninput="updateAll()">
        </div>
        <div class="form-group">
            <label>背景故事</label>
            <textarea id="background" oninput="updateAll()"></textarea>
        </div>
    </div>

    <div class="panel">
        <h2>性格与能力 <button class="btn-random" onclick="randomizeAll()">🎲 全部随机生成</button></h2>
        <div class="flex-row">
            <div class="form-group"><label>野心(0-10)</label><input type="number" id="ambition" min="0" max="10" value="5" oninput="updateAll()"></div>
            <div class="form-group"><label>勇敢(0-10)</label><input type="number" id="bravery" min="0" max="10" value="5" oninput="updateAll()"></div>
            <div class="form-group"><label>理性(0-10)</label><input type="number" id="rationality" min="0" max="10" value="5" oninput="updateAll()"></div>
        </div>
        <div class="flex-row">
            <div class="form-group"><label>仁慈(0-10)</label><input type="number" id="mercy" min="0" max="10" value="5" oninput="updateAll()"></div>
            <div class="form-group"><label>忠义(0-10)</label><input type="number" id="loyalty" min="0" max="10" value="5" oninput="updateAll()"></div>
            <div class="form-group"><label>悟性(0-10)</label><input type="number" id="learning" min="0" max="10" value="5" oninput="updateAll()"></div>
        </div>
        <hr style="border-color: #45475a; margin: 15px 0;">
        <div class="flex-row">
            <div class="form-group"><label>基底谋略</label><input type="number" id="base_strategy" min="0" max="100" value="50" oninput="updateAll()"></div>
            <div class="form-group"><label>基底军事</label><input type="number" id="base_military" min="0" max="100" value="50" oninput="updateAll()"></div>
            <div class="form-group"><label>基底武力</label><input type="number" id="base_force" min="0" max="100" value="50" oninput="updateAll()"></div>
        </div>
        <div class="flex-row">
            <div class="form-group"><label>基底智力</label><input type="number" id="base_intelligence" min="0" max="100" value="50" oninput="updateAll()"></div>
            <div class="form-group"><label>基底人情</label><input type="number" id="base_social" min="0" max="100" value="50" oninput="updateAll()"></div>
        </div>
    </div>

    <div class="panel">
        <h2>最终动态面板</h2>
        <div class="stat-result"><span class="stat-name">谋略</span><span class="stat-val" id="final_strategy">50</span></div>
        <div class="stat-result"><span class="stat-name">军事</span><span class="stat-val" id="final_military">50</span></div>
        <div class="stat-result"><span class="stat-name">武力</span><span class="stat-val" id="final_force">50</span></div>
        <div class="stat-result"><span class="stat-name">智力</span><span class="stat-val" id="final_intelligence">50</span></div>
        <div class="stat-result"><span class="stat-name">人情世故</span><span class="stat-val" id="final_social">50</span></div>
    </div>

    <div class="panel">
        <h2>底层数据流预览</h2>
        <textarea id="promptPreview" readonly style="height: 230px; background: #11111b; color: #a6e3a1;"></textarea>
    </div>
</div>

<script>
    let finalStats = {};

    function clamp(val, min, max) {
        return Math.max(min, Math.min(max, val));
    }

    function getVal(id) {
        return parseFloat(document.getElementById(id).value) || 0;
    }

    function getStr(id) {
        return document.getElementById(id).value || "";
    }

    function setVal(id, val) {
        document.getElementById(id).value = val;
    }

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomizeAll() {
        setVal('ambition', getRandomInt(1, 10));
        setVal('bravery', getRandomInt(1, 10));
        setVal('rationality', getRandomInt(1, 10));
        setVal('mercy', getRandomInt(1, 10));
        setVal('loyalty', getRandomInt(1, 10));
        setVal('learning', getRandomInt(1, 10));

        setVal('base_strategy', getRandomInt(15, 90));
        setVal('base_military', getRandomInt(15, 90));
        setVal('base_force', getRandomInt(15, 90));
        setVal('base_intelligence', getRandomInt(15, 90));
        setVal('base_social', getRandomInt(15, 90));

        updateAll();
    }

    function updateAll() {
        const amb = getVal('ambition') - 5;
        const brav = getVal('bravery') - 5;
        const rat = getVal('rationality') - 5;
        const mer = getVal('mercy') - 5;

        finalStats = {
            strategy: clamp(getVal('base_strategy') + (amb * 2) + (rat * 1), 0, 100),
            military: clamp(getVal('base_military') + (brav * 1) + (rat * 1), 0, 100),
            force: clamp(getVal('base_force') + (brav * 2) - (mer * 1), 0, 100),
            intelligence: clamp(getVal('base_intelligence') + (rat * 2), 0, 100),
            social: clamp(getVal('base_social') - (amb * 1) + (mer * 2), 0, 100)
        };

        document.getElementById('final_strategy').innerText = finalStats.strategy;
        document.getElementById('final_military').innerText = finalStats.military;
        document.getElementById('final_force').innerText = finalStats.force;
        document.getElementById('final_intelligence').innerText = finalStats.intelligence;
        document.getElementById('final_social').innerText = finalStats.social;

        generatePrompt();
    }

    function generatePrompt() {
        const name = getStr('npcName') || "[未命名]";
        const enableAI = document.getElementById('enableAI').checked;
        const isMass = document.getElementById('isMassProduced').checked;
        const presets = getStr('dialoguePresets').split('\n').filter(line => line.trim() !== '');
        
        let outputText = "";

        if (!enableAI) {
            outputText = `【系统指令】：该实体已关闭 AI 动态演算。\n`;
            outputText += `【实体定位】：${isMass ? "量产型通用模板" : "独立固定NPC"}\n\n`;
            outputText += `【调用逻辑】：当玩家交互时，引擎将不消耗 Token，直接从以下预设池中随机抽取反馈：\n`;
            presets.forEach((p, index) => {
                outputText += `  ${index + 1}. "${p}"\n`;
            });
        } else {
            const bg = getStr('background');
            const p = {
                amb: getVal('ambition'), brav: getVal('bravery'),
                rat: getVal('rationality'), mer: getVal('mercy'),
                loy: getVal('loyalty'), lrn: getVal('learning')
            };

            outputText = `【系统指令】：AI 动态演算已开启。\n`;
            outputText += `【实体定位】：${isMass ? "受 AI 控制的群体集群意识/通用模板" : "拥有独立灵魂的核心人物"}\n\n`;
            outputText += `你的名字是${name}。\n背景：${bg}\n\n`;
            outputText += `【深层性格基底 (0-10)】：\n`;
            outputText += `- 野心：${p.amb} | 勇敢：${p.brav} | 理性：${p.rat} | 仁慈：${p.mer} | 忠义：${p.loy}\n\n`;
            outputText += `【表层能力数值】（请在对话的字里行间体现）：\n`;
            outputText += `- 谋略 ${finalStats.strategy} | 军事 ${finalStats.military} | 武力 ${finalStats.force} | 智力 ${finalStats.intelligence} | 人情 ${finalStats.social}\n`;
        }

        document.getElementById('promptPreview').value = outputText;
    }

    function exportJSON() {
        const presetsRaw = getStr('dialoguePresets').split('\n').filter(line => line.trim() !== '');
        
        const data = {
            id_name: (getStr('npcName') || "template").toLowerCase().replace(/\s+/g, '_'),
            name: getStr('npcName'),
            is_mass_produced: document.getElementById('isMassProduced').checked,
            enable_ai: document.getElementById('enableAI').checked,
            dialogue_presets: presetsRaw,
            birth_year: getVal('birthYear'),
            background: getStr('background'),
            personality: {
                ambition: getVal('ambition'), bravery: getVal('bravery'),
                rationality: getVal('rationality'), mercy: getVal('mercy'),
                loyalty: getVal('loyalty'), learning_ability: getVal('learning')
            },
            base_stats: {
                strategy: getVal('base_strategy'), military: getVal('base_military'),
                force: getVal('base_force'), intelligence: getVal('base_intelligence'),
                social: getVal('base_social')
            },
            final_stats: finalStats,
            dynamic: {
                true_favorability: 0, displayed_favorability: 0,
                fear: 0, anger: 0
            },
            memos: [],
            system_prompt: document.getElementById('enableAI').checked ? document.getElementById('promptPreview').value : ""
        };

        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 4));
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.setAttribute("href", dataStr);
        let prefix = data.is_mass_produced ? "mob_" : "npc_";
        dlAnchorElem.setAttribute("download", prefix + data.id_name + ".json");
        dlAnchorElem.click();
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                
                document.getElementById('isMassProduced').checked = !!data.is_mass_produced;
                document.getElementById('enableAI').checked = data.enable_ai !== undefined ? data.enable_ai : true;
                
                if (data.dialogue_presets && Array.isArray(data.dialogue_presets)) {
                    document.getElementById('dialoguePresets').value = data.dialogue_presets.join('\n');
                }

                setVal('npcName', data.name || "");
                setVal('birthYear', data.birth_year || 0);
                setVal('background', data.background || "");

                if(data.personality) {
                    setVal('ambition', data.personality.ambition || 5);
                    setVal('bravery', data.personality.bravery || 5);
                    setVal('rationality', data.personality.rationality || 5);
                    setVal('mercy', data.personality.mercy || 5);
                    setVal('loyalty', data.personality.loyalty || 5);
                    setVal('learning', data.personality.learning_ability || 5);
                }

                if(data.base_stats) {
                    setVal('base_strategy', data.base_stats.strategy || 50);
                    setVal('base_military', data.base_stats.military || 50);
                    setVal('base_force', data.base_stats.force || 50);
                    setVal('base_intelligence', data.base_stats.intelligence || 50);
                    setVal('base_social', data.base_stats.social || 50);
                }

                updateAll();
            } catch (err) {
                alert("JSON 解析失败，请检查文件格式。");
            }
        };
        reader.readAsText(file);
    }

    updateAll();
</script>
</body>
</html>
