<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什么？</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --primary-hover: #fa5252;
            --bg: #f8f9fa;
            --text: #343a40;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .selection-area {
            margin-bottom: 30px;
            padding: 15px;
            background: #f1f3f5;
            border-radius: 12px;
        }

        .category-group {
            margin-bottom: 15px;
        }

        .category-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 16px;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 4px;
        }

        .checkbox-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            user-select: none;
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #dee2e6;
            transition: all 0.2s;
        }

        .checkbox-label:hover {
            border-color: var(--primary);
        }

        .checkbox-label input {
            margin-right: 6px;
            accent-color: var(--primary);
        }

        .draw-area {
            text-align: center;
        }

        .result-box {
            height: 100px;
            background: #fff5f5;
            border: 2px dashed var(--primary);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .result-box.animating {
            color: #868e96;
            border-color: #ced4da;
            background: #f8f9fa;
        }

        .btn-start {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        .btn-start:disabled {
            background-color: #adb5bd;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .stats {
            margin-top: 10px;
            font-size: 12px;
            color: #868e96;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎲 下一顿吃什么？</h1>

    <div class="selection-area" id="selectionArea">
    </div>

    <div class="draw-area">
        <div class="result-box" id="resultBox">等待抽取...</div>
        <button class="btn-start" id="startBtn" onclick="startDraw()">开始抽取</button>
        <div class="stats" id="statsDisplay">当前选中了 0 个菜品入池</div>
    </div>
</div>

<script>
    let foodData = [];
    const selectionArea = document.getElementById('selectionArea');
    const resultBox = document.getElementById('resultBox');
    const startBtn = document.getElementById('startBtn');
    const statsDisplay = document.getElementById('statsDisplay');

    function renderCheckboxes() {
        selectionArea.innerHTML = '';
        
        foodData.forEach(category => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'category-group';
            
            const titleDiv = document.createElement('div');
            titleDiv.className = 'category-title';
            titleDiv.innerText = category.categoryName;
            groupDiv.appendChild(titleDiv);

            const gridDiv = document.createElement('div');
            gridDiv.className = 'checkbox-grid';

            const label = document.createElement('label');
            label.className = 'checkbox-label';
            const shortName = category.categoryName.split(' ')[1] || category.categoryName;
            label.innerHTML = `
                <input type="checkbox" value="${category.categoryId}" onchange="updatePoolStats()"> 
                全选 ${shortName}
            `;
            gridDiv.appendChild(label);

            groupDiv.appendChild(gridDiv);
            selectionArea.appendChild(groupDiv);
        });
    }

    function getCurrentPool() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
        let currentPool = [];
        
        checkboxes.forEach(cb => {
            const category = foodData.find(c => c.categoryId === cb.value);
            if (category && category.items) {
                let itemsArray = category.items;
                
                if (typeof itemsArray === 'string') {
                    itemsArray = itemsArray.split(/[\s,，、\n]+/).filter(item => item.trim() !== '');
                }
                
                currentPool = currentPool.concat(itemsArray);
            }
        });
        
        return [...new Set(currentPool)];
    }

    function updatePoolStats() {
        const pool = getCurrentPool();
        statsDisplay.innerText = `当前选中了 ${pool.length} 个备选菜品入池`;
    }

    let drawInterval = null;
    let isDrawing = false;

    function startDraw() {
        const pool = getCurrentPool();

        if (pool.length === 0) {
            alert("⚠️ 请至少选择一个分类哦！");
            return;
        }

        if (isDrawing) return;

        isDrawing = true;
        startBtn.disabled = true;
        startBtn.innerText = "抽取中...";
        resultBox.classList.add('animating');

        let counter = 0;
        const totalDuration = 2500;
        const intervalSpeed = 50;

        drawInterval = setInterval(() => {
            const randomIndex = Math.floor(Math.random() * pool.length);
            resultBox.innerText = pool[randomIndex];
            counter += intervalSpeed;

            if (counter >= totalDuration) {
                clearInterval(drawInterval);
                finishDraw(pool);
            }
        }, intervalSpeed);
    }

    function finishDraw(pool) {
        const finalWinner = pool[Math.floor(Math.random() * pool.length)];
        resultBox.innerText = finalWinner;
        
        resultBox.classList.remove('animating');
        startBtn.disabled = false;
        startBtn.innerText = "再抽一次";
        isDrawing = false;
        
        resultBox.style.transform = "scale(1.1)";
        setTimeout(() => resultBox.style.transform = "scale(1)", 200);
    }

    fetch('./menu.json')
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            if (data && data.categories) {
                foodData = data.categories;
                renderCheckboxes();
                updatePoolStats();
            }
        })
        .catch(error => {
            selectionArea.innerHTML = '<p style="color:red;">无法加载菜单数据，请检查网络或确认 menu.json 已生成。</p>';
        });
</script>

</body>
</html>
