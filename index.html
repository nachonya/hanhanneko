<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能多文件刷题系统 (AI增强版)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 650px;
            padding: 30px;
            box-sizing: border-box;
        }
        
        /* 首页样式 */
        .home-menu h1 { text-align: center; color: #2c3e50; }
        .menu-section {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .menu-section h3 { margin-top: 0; margin-bottom: 15px; font-size: 1.1rem; color: #495057; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; }
        
        /* 按钮与表单 */
        .btn {
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-blue { background-color: #007bff; }
        .btn-green { background-color: #28a745; }
        .btn-purple { background-color: #6f42c1; }
        .btn-orange { background-color: #fd7e14; }
        .btn-danger { background-color: #dc3545; }
        .btn-outline { background-color: transparent; border: 1px solid #007bff; color: #007bff; }
        
        .api-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        /* 答题区样式 */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            border-radius: 3px;
            margin-bottom: 10px;
        }
        .badge-single { background-color: #007bff; }
        .badge-true-false { background-color: #17a2b8; }
        .badge-fill { background-color: #6f42c1; }

        .question-text { font-size: 1.25rem; font-weight: bold; margin-bottom: 20px; line-height: 1.5; }
        .options-container { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background-color: #f8f9fa; border: 2px solid #e9ecef;
            padding: 14px; border-radius: 6px; cursor: pointer;
            text-align: left; font-size: 1rem; transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) { background-color: #e9ecef; border-color: #dee2e6; }
        .option-btn:disabled { cursor: not-allowed; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        
        .blank-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .blank-input { padding: 10px; border: 2px solid #ced4da; border-radius: 6px; width: 60%; outline: none; }
        .correct-input { border-color: #28a745 !important; background-color: #d4edda; }
        .wrong-input { border-color: #dc3545 !important; background-color: #f8d7da; }
        
        .feedback-box {
            margin-top: 20px; padding: 15px; border-radius: 4px; display: none; line-height: 1.6;
            background-color: #e8f4fd; border-left: 4px solid #007bff;
        }
        .ai-box {
            margin-top: 15px; padding: 15px; border-radius: 4px; display: none; line-height: 1.6;
            background-color: #f8f9fa; border: 1px solid #ced4da; font-size: 0.95rem;
        }
        .controls { margin-top: 25px; display: flex; justify-content: space-between; align-items: center; }
        .header-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.9rem; color: #6c757d; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="home-screen" class="home-menu">
        <h1>系统主页</h1>
        
        <div class="menu-section">
            <h3>选择练习章节 (读取独立JSON)</h3>
            <div class="btn-group" id="chapter-buttons">
                </div>
        </div>

        <div class="menu-section">
            <h3>综合挑战与错题集</h3>
            <div class="btn-group">
                <button class="btn btn-purple" onclick="startRandom()">🎲 全题库随机 (20题)</button>
                <button class="btn btn-danger" onclick="startMistakes()">📖 刷错题本 (<span id="mistake-count">0</span>题)</button>
                <button class="btn btn-outline" onclick="clearMistakes()">清空错题</button>
            </div>
        </div>

        <div class="menu-section">
            <h3>DeepSeek API 配置 (用于错题解析)</h3>
            <input type="password" id="api-key-input" class="api-input" placeholder="输入您的 DeepSeek API Key (sk-...)">
            <button class="btn btn-green" onclick="saveApiKey()">保存 Key</button>
            <span id="api-status" style="font-size: 0.85rem; color: #28a745; margin-left: 10px;"></span>
        </div>
    </div>

    <div id="quiz-screen" style="display: none;">
        <div class="header-bar">
            <button class="btn btn-outline" style="padding: 5px 10px;" onclick="goHome()">← 返回主页</button>
            <span id="quiz-status">进度: 0/0 | 得分: 0</span>
        </div>
        
        <div id="type-badge"></div>
        <div class="question-text" id="question-text"></div>
        <div class="options-container" id="options-container"></div>
        
        <div class="feedback-box" id="feedback">
            <div id="standard-explanation"></div>
            <button class="btn btn-orange" id="ai-btn" style="margin-top: 10px; display: none;" onclick="callDeepSeek()">
                ✨ 让 DeepSeek 帮我解析
            </button>
            <div class="ai-box" id="ai-feedback"></div>
        </div>
        
        <div class="controls">
            <div></div> 
            <button class="btn btn-green" id="submit-btn" style="display: none;" onclick="checkFillBlank()">提交填空</button>
            <button class="btn btn-blue" id="next-btn" style="display: none;" onclick="nextQuestion()">下一题</button>
        </div>
    </div>
    
    <div id="result-screen" style="display: none; text-align: center;">
        <h2>练习完成！</h2>
        <p style="font-size: 1.2rem;">最终得分：<strong id="final-score" style="color: #28a745; font-size: 1.8rem;"></strong></p>
        <button class="btn btn-blue" style="margin-top: 15px;" onclick="goHome()">返回主页</button>
    </div>

</div>

<script>
    // ---------------- 全局配置与状态 ----------------
    // 【重要】在这里配置你所有的 JSON 题库文件
    const chapterFiles = [
        { name: "第一章", file: "questions1.json" },
        { name: "第二章", file: "questions2.json" }
        // 随时在此添加更多文件: { name: "第三章", file: "questions3.json" }
    ];

    let currentPool = [];
    let currentIndex = 0;
    let score = 0;
    let wrongQuestions = JSON.parse(localStorage.getItem('myWrongQuestions')) || [];
    let currentQuestionUserAnswer = ""; // 记录当前题用户选了什么，用于发给AI

    // DOM 元素引用
    const el = {
        home: document.getElementById('home-screen'),
        quiz: document.getElementById('quiz-screen'),
        result: document.getElementById('result-screen'),
        qText: document.getElementById('question-text'),
        options: document.getElementById('options-container'),
        feedback: document.getElementById('feedback'),
        stdExpl: document.getElementById('standard-explanation'),
        aiBtn: document.getElementById('ai-btn'),
        aiFeedback: document.getElementById('ai-feedback'),
        submitBtn: document.getElementById('submit-btn'),
        nextBtn: document.getElementById('next-btn'),
        status: document.getElementById('quiz-status'),
        badge: document.getElementById('type-badge'),
        apiInput: document.getElementById('api-key-input')
    };

    // ---------------- 初始化 ----------------
    function init() {
        document.getElementById('mistake-count').innerText = wrongQuestions.length;
        
        // 恢复 API Key
        const savedKey = localStorage.getItem('deepseek_api_key');
        if(savedKey) {
            el.apiInput.value = savedKey;
            document.getElementById('api-status').innerText = "已加载已存 Key";
        }

        // 动态生成章节按钮
        const chapBtnContainer = document.getElementById('chapter-buttons');
        chapBtnContainer.innerHTML = '';
        chapterFiles.forEach(chap => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-blue';
            btn.innerText = chap.name;
            btn.onclick = () => startChapter(chap.file);
            chapBtnContainer.appendChild(btn);
        });
    }

    function saveApiKey() {
        const val = el.apiInput.value.trim();
        if(val) {
            localStorage.setItem('deepseek_api_key', val);
            document.getElementById('api-status').innerText = "保存成功！";
        }
    }

    function goHome() {
        el.quiz.style.display = 'none';
        el.result.style.display = 'none';
        el.home.style.display = 'block';
        init();
    }

    // ---------------- 刷题模式加载 ----------------
    
    // 模式一：单章刷题
    async function startChapter(fileName) {
        try {
            const res = await fetch(fileName);
            if (!res.ok) throw new Error("文件不存在");
            currentPool = await res.json();
            beginQuiz();
        } catch (error) {
            alert(`加载 ${fileName} 失败，请确保本地服务器已开启且文件存在。`);
        }
    }

    // 模式二：全局随机
    async function startRandom() {
        try {
            const fetches = chapterFiles.map(chap => fetch(chap.file).then(r => r.ok ? r.json() : []));
            const results = await Promise.all(fetches);
            // 合并所有数组并打乱
            let allQ = results.flat();
            allQ.sort(() => 0.5 - Math.random());
            // 截取前20题
            currentPool = allQ.slice(0, 20);
            
            if(currentPool.length === 0) throw new Error("题库为空");
            beginQuiz();
        } catch (error) {
            alert("加载全局题库失败，请检查配置文件。");
        }
    }

    // 模式三：错题重刷
    function startMistakes() {
        if(wrongQuestions.length === 0) {
            alert("太棒了，目前没有错题！");
            return;
        }
        currentPool = [...wrongQuestions]; // 复制一份错题
        beginQuiz();
    }

    function clearMistakes() {
        if(confirm("确定要清空错题本吗？")) {
            wrongQuestions = [];
            localStorage.removeItem('myWrongQuestions');
            init();
        }
    }

    // ---------------- 答题逻辑 ----------------
    function beginQuiz() {
        currentIndex = 0;
        score = 0;
        el.home.style.display = 'none';
        el.result.style.display = 'none';
        el.quiz.style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const q = currentPool[currentIndex];
        currentQuestionUserAnswer = "";
        
        el.options.innerHTML = '';
        el.feedback.style.display = 'none';
        el.aiFeedback.style.display = 'none';
        el.aiBtn.style.display = 'none';
        el.nextBtn.style.display = 'none';
        el.submitBtn.style.display = 'none';
        el.status.innerText = `进度: ${currentIndex + 1}/${currentPool.length} | 得分: ${score}`;

        if (q.type === 'single_choice') {
            el.badge.innerHTML = '<span class="badge badge-single">单选题</span>';
            el.qText.innerText = q.question;
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkSelection(btn, idx, q.answer, q.explanation);
                el.options.appendChild(btn);
            });
        } 
        else if (q.type === 'true_false') {
            el.badge.innerHTML = '<span class="badge badge-true-false">判断题</span>';
            el.qText.innerText = q.question;
            ["对", "错"].forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkSelection(btn, idx, q.answer, q.explanation);
                el.options.appendChild(btn);
            });
        } 
        else if (q.type === 'fill_blank') {
            el.badge.innerHTML = '<span class="badge badge-fill">填空题</span>';
            el.qText.innerText = q.question;
            q.answer.forEach((ans, idx) => {
                const row = document.createElement('div');
                row.className = 'blank-row';
                row.innerHTML = `<span>空 ${idx + 1}:</span> <input type="text" class="blank-input" data-idx="${idx}">`;
                el.options.appendChild(row);
            });
            el.submitBtn.style.display = 'inline-block';
        }
    }

    function checkSelection(btn, selectedIdx, correctIdx, explanation) {
        const q = currentPool[currentIndex];
        const allBtns = el.options.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);
        
        // 记录用户选择的具体文本，发给AI用
        currentQuestionUserAnswer = btn.innerText; 

        if (selectedIdx === correctIdx) {
            btn.classList.add('correct');
            score++;
            showExplanation(explanation, true);
        } else {
            btn.classList.add('wrong');
            allBtns[correctIdx].classList.add('correct');
            saveToMistakes(q);
            showExplanation(explanation, false);
        }
    }

    function checkFillBlank() {
        const q = currentPool[currentIndex];
        const inputs = el.options.querySelectorAll('.blank-input');
        let isAllCorrect = true;
        let userAnsArray = [];

        inputs.forEach(input => {
            const idx = parseInt(input.getAttribute('data-idx'));
            const userAns = input.value.trim().toLowerCase();
            const correctAns = q.answer[idx].toString().trim().toLowerCase();
            userAnsArray.push(input.value);

            input.disabled = true;
            if (userAns === correctAns) {
                input.classList.add('correct-input');
            } else {
                input.classList.add('wrong-input');
                isAllCorrect = false;
            }
        });
        
        currentQuestionUserAnswer = userAnsArray.join(", ");
        el.submitBtn.style.display = 'none';

        if (isAllCorrect) {
            score++;
            showExplanation(q.explanation, true);
        } else {
            saveToMistakes(q);
            showExplanation(q.explanation, false);
        }
    }

    function saveToMistakes(qObj) {
        if (!wrongQuestions.find(q => q.question === qObj.question)) {
            wrongQuestions.push(qObj);
            localStorage.setItem('myWrongQuestions', JSON.stringify(wrong
