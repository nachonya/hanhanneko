<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>烟雨楼阁</title>
<style>
/* ================= 工具箱导航样式 ================= */
.nav-section { margin-top: 60px; text-align: center; }
.nav-title { color: #888; font-size: 1.1rem; margin-bottom: 30px; letter-spacing: 1px; }
.nav-grid {
    display: grid;
    /* 自动适应宽度，手机上一排两三个，电脑上一排好几个 */
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 20px;
    padding: 0 10px;
}
.nav-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #fff; padding: 20px 15px; border-radius: 16px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.03); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    text-decoration: none; color: #333; position: relative; overflow: hidden;
}
.nav-item:hover { 
    transform: translateY(-8px); 
    box-shadow: 0 15px 30px rgba(0,0,0,0.08); 
}
.nav-item img { 
    width: 48px; height: 48px; border-radius: 12px; margin-bottom: 12px; 
    object-fit: contain; transition: transform 0.3s ease;
}
.nav-item:hover img { transform: scale(1.1); }
.nav-item span { font-size: 0.95rem; font-weight: bold; color: #1a1a1a; }
.nav-item .nav-desc { font-size: 0.75rem; color: #888; margin-top: 4px; }
/* 本地Emoji图标特别样式 */
.nav-item .emoji-icon { font-size: 40px; line-height: 48px; margin-bottom: 12px; }
.screen-wipe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #111;
    z-index: 9999;
    animation: swipeRight 0.7s cubic-bezier(0.77, 0, 0.175, 1) 0.3s forwards;
}

@keyframes swipeRight {
    0% { transform: translateX(0); }
    100% { transform: translateX(100%); }
}

@keyframes pixivSlideUp {
    0% { opacity: 0; transform: translateY(120px); }
    100% { opacity: 1; transform: translateY(0); }
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background-color: #f7f9fa;
    color: #333;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    cursor: default;
}

.hero {
    position: relative;
    height: 85vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%);
}

.floating-bg { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; }
.float-item {
    position: absolute; border-radius: 16px; opacity: 0;
    animation: pixivSlideUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    box-shadow: 0 20px 40px rgba(0,0,0,0.06);
}

.item1 { width: 220px; height: 320px; left: 8%; top: 15%; animation-delay: 0.1s; background-color: #ffd6a5; }
.item2 { width: 280px; height: 180px; right: 10%; top: 20%; animation-delay: 0.25s; background-color: #ffadad; }
.item3 { width: 200px; height: 260px; left: 18%; bottom: 10%; animation-delay: 0.4s; background-color: #caffbf; }
.item4 { width: 300px; height: 220px; right: 15%; bottom: 15%; animation-delay: 0.55s; background-color: #9bf6ff; }

.hero-content {
    position: relative; z-index: 10; text-align: center;
    background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
    padding: 50px 80px; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.05);
    opacity: 0; animation: pixivSlideUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
}

.hero-subtitle { color: #888; font-size: 1.2rem; margin-bottom: 10px; font-weight: 500; }
.hero-title { margin: 0; font-size: 3.5rem; font-weight: 800; color: #1a1a1a; letter-spacing: -1px; }
.hero-title span { color: #ff9800; }

.container { max-width: 1100px; margin: 4rem auto; padding: 0 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }

.card-wrapper {
    opacity: 0; transform: translateY(80px);
    transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
}
.card-wrapper.visible { opacity: 1; transform: translateY(0); }

.info-card {
    background: #fff; padding: 40px; border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: all 0.5s ease;
    height: 100%; box-sizing: border-box;
}
.info-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
.info-card h2 { color: #1a1a1a; margin-top: 0; font-size: 1.5rem; }
.info-card p { color: #666; font-size: 1rem; line-height: 1.8; }

.dlc-section { margin-bottom: 60px; display: flex; flex-direction: column; align-items: center; }
.dlc-title { color: #888; font-size: 1.1rem; margin-bottom: 20px; letter-spacing: 1px; }
.card-scene { width: 320px; height: 200px; perspective: 1000px; cursor: pointer; }
.gacha-card {
    width: 100%; height: 100%; position: relative;
    transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    transform-style: preserve-3d;
}
.gacha-card.is-flipped { transform: rotateY(180deg); }
.card-face {
    position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
    border-radius: 20px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 20px;
    box-sizing: border-box; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
.card-front { background: linear-gradient(135deg, #fffaf0 0%, #fff 100%); border: 4px solid #f8ecec; }
.card-front h3 { margin: 0; color: #ffb7b2; font-size: 1.8rem; }
.card-front p { color: #a0a0a0; font-size: 0.9rem; margin-top: 10px; }
.card-back { background-color: #fff; transform: rotateY(180deg); border: 2px dashed #ffb7b2; }
.fortune-level { font-size: 1.8rem; font-weight: bold; color: #e57373; margin-bottom: 10px; }
.fortune-text { font-size: 1rem; line-height: 1.6; color: #666; }

footer { text-align: center; padding: 3rem 0; color: #aaa; margin-top: 4rem; }

.pixel-cat {
    position: fixed;
    top: -50px;
    left: -50px;
    width: 48px;
    height: 48px;
    pointer-events: none;
    z-index: 9998;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

.pixel-cat img {
    width: 100%;
    height: auto;
    display: block;
    /* ================= 核心修改：GIF 镜像翻转 ================= */
    transform: scaleX(-1);
}
/* ================= 音乐播放器悬浮按钮 ================= */
.music-toggle {
    position: fixed; bottom: 30px; right: 30px; z-index: 9999;
    background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
    border: 1px solid #ddd; padding: 12px 20px; border-radius: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: pointer;
    font-weight: bold; color: #333; transition: all 0.3s ease;
    display: flex; align-items: center; gap: 8px;
}
.music-toggle:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
.music-toggle.playing { background: #ff9800; color: #fff; border-color: #ff9800; }
</style>
</head>
<body>

<div class="screen-wipe"></div>
<audio id="bgmPlayer" loop preload="none"></audio>
    <div id="musicBtn" class="music-toggle" style="display: none;" onclick="toggleMusic()">
        🎵 <span id="musicText">播放 BGM</span>
    </div>
<div class="pixel-cat" id="pixelCat">
    <img src="cat.gif" alt="">
</div>

<div class="hero">
    <div class="floating-bg">
        <div class="float-item item1"></div>
        <div class="float-item item2"></div>
        <div class="float-item item3"></div>
        <div class="float-item item4"></div>
    </div>
    <div class="hero-content">
        <div class="hero-subtitle">欢迎来到我的赛博秘密基地</div>
        <h1 class="hero-title">日常碎碎念，<span>魅力无穷</span></h1>
    </div>
</div>

<div class="container" id="content">
    
    <div class="card-wrapper scroll-anim dlc-section">
        <div class="dlc-title">— 今日运势 DLC 模块 —</div>
        <div class="card-scene" onclick="flipCard()">
            <div class="gacha-card" id="myCard">
                <div class="card-face card-front">
                    <h3>⛩️ 每日祈愿</h3>
                    <p>点击翻开今天的专属动漫台词</p>
                </div>
                <div class="card-face card-back">
                    <div class="fortune-level" id="fortuneLevel">大吉</div>
                    <div class="fortune-text" id="fortuneText">...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="grid">
	<div class="card-wrapper scroll-anim nav-section">
        <div class="nav-title">— 🧰 赛博工具箱 & 导航 —</div>
        <div class="nav-grid" id="navGrid">
            </div>
    </div>

        </div>
    </div>
</div>

<footer>
    © 2026 我的伊甸园
</footer>

<script>
    if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
    }
    window.scrollTo(0, 0);

    document.addEventListener("DOMContentLoaded", function() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.scroll-anim').forEach((el) => {
            observer.observe(el);
        });
    });

    const fortunes = [
        { level: "大吉", text: "今日宜重温《魔女之旅》，享受一段没有终点的旅程。" },
        { level: "中吉", text: "泡一杯热茶，翻开那本吃灰的阿加莎小说吧，迷局在等你。" },
        { level: "大吉", text: "适合在《幻兽帕鲁》里摸鱼，或者盖一座舒适的木屋。" },
        { level: "超吉", text: "《咒术回战》里的烦恼就留在动漫里，今天你在现实中是无敌的！" }
    ];

    let isFlipped = false;
    function flipCard() {
        const card = document.getElementById('myCard');
        if (!isFlipped) {
            const randomIndex = Math.floor(Math.random() * fortunes.length);
            document.getElementById('fortuneLevel').innerText = fortunes[randomIndex].level;
            document.getElementById('fortuneText').innerText = fortunes[randomIndex].text;
            
            if(fortunes[randomIndex].level === "末吉") {
                document.getElementById('fortuneLevel').style.color = "#90a4ae";
            } else {
                document.getElementById('fortuneLevel').style.color = "#e57373";
            }
            card.classList.add('is-flipped');
            isFlipped = true;
        } else {
            card.classList.remove('is-flipped');
            isFlipped = false;
        }
    }

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let catX = mouseX;
    let catY = mouseY;
    const cat = document.getElementById('pixelCat');
    let isFacingRight = true;

    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function animateCat() {
        let distX = mouseX - catX;
        let distY = mouseY - catY;
        
        catX += distX * 0.015;
        catY += distY * 0.015;

        if (distX > 2) isFacingRight = true;
        if (distX < -2) isFacingRight = false;

        let scaleX = isFacingRight ? 1 : -1;
        
        cat.style.left = catX + 'px';
        cat.style.top = catY + 'px';
        cat.style.transform = `scaleX(${scaleX})`;

        requestAnimationFrame(animateCat);
    }
    animateCat();
// ================= 导航工具箱逻辑 =================

    // ================= 1. 加载全局设置 (背景与音乐) =================
    fetch('settings.json')
        .then(response => response.json())
        .then(data => {
            // 如果后台上传了背景图，就替换网页背景
            if (data.bg_image) {
                document.body.style.backgroundImage = `url('${data.bg_image}')`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundAttachment = 'fixed';
                document.body.style.backgroundPosition = 'center';
            }
            // 如果后台上传了音乐，就激活右下角的播放按钮
            if (data.bgm_audio) {
                const player = document.getElementById('bgmPlayer');
                const btn = document.getElementById('musicBtn');
                player.src = data.bgm_audio;
                btn.style.display = 'flex'; // 显示悬浮按钮
            }
        })
        .catch(error => console.error('加载全局设置失败:', error));

    // 音乐播放控制开关
    function toggleMusic() {
        const player = document.getElementById('bgmPlayer');
        const btn = document.getElementById('musicBtn');
        const text = document.getElementById('musicText');
        
        if (player.paused) {
            player.play();
            btn.classList.add('playing');
            text.innerText = '暂停 BGM';
        } else {
            player.pause();
            btn.classList.remove('playing');
            text.innerText = '播放 BGM';
        }
    }

    // ================= 2. 加载工具箱 (支持自定义上传图标) =================
    const navGrid = document.getElementById('navGrid');
    if(navGrid) {
        fetch('links.json')
            .then(response => response.json())
            .then(data => {
                data.links.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.className = 'nav-item';
                    if (link.url.startsWith('http')) {
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                    }

                    // 图标优先级：1.自定义上传图标 -> 2.Emoji -> 3.自动抓取网站图标
                    let iconHtml = '';
                    if (link.custom_icon) {
                        iconHtml = `<img src="${link.custom_icon}" alt="${link.name} icon" style="width:48px;height:48px;border-radius:12px;margin-bottom:12px;object-fit:cover;" loading="lazy">`;
                    } else if (link.emoji && link.emoji.trim() !== "") {
                        iconHtml = `<div class="emoji-icon">${link.emoji}</div>`;
                    } else {
                        const domain = new URL(link.url).hostname;
                        const iconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
                        iconHtml = `<img src="${iconUrl}" alt="${link.name} icon" loading="lazy">`;
                    }

                    a.innerHTML = `
                        ${iconHtml}
                        <span>${link.name}</span>
                        <div class="nav-desc">${link.desc || ''}</div>
                    `;
                    navGrid.appendChild(a);
                });
            })
            .catch(error => console.error('加载工具箱失败:', error));
    }
</script>
</body>
</html>
