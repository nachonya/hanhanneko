backend:
  name: github
  repo: nachonya/hanhanneko
  branch: main

# 关键：告诉后台把上传的图片和音乐存到哪里
media_folder: "images"
public_folder: "/images"

collections:
  - name: "toolbox"
    label: "🧰 工具箱管理"
    files:
      - file: "links.json"
        name: "links_data"
        label: "修改导航链接"
        fields:
          - label: "网站列表"
            name: "links"
            widget: "list"
            fields:
              - {label: "名称", name: "name", widget: "string"}
              - {label: "网址", name: "url", widget: "string"}
              - {label: "描述", name: "desc", widget: "string", required: false}
              - {label: "Emoji", name: "emoji", widget: "string", required: false}
              - {label: "自定义图标 (选填，上传后优先显示)", name: "custom_icon", widget: "image", required: false}

  - name: "site_settings"
    label: "⚙️ 网站全局设置"
    files:
      - file: "settings.json"
        name: "general_settings"
        label: "背景与音乐"
        fields:
          - {label: "全局背景图片", name: "bg_image", widget: "image", required: false}
          - {label: "全局背景音乐 (MP3格式)", name: "bgm_audio", widget: "file", required: false}
